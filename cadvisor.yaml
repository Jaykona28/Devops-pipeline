apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadvisor

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cadvisor

  template:
    metadata:
      labels:
        app: cadvisor

    spec:
      containers:
      - name: cadvisor
        image: gcr.io/cadvisor/cadvisor:latest

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"

          limits:
            memory: "100Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service

metadata:
  name: cadvisor-service

spec:
  selector:
    app: cadvisor

  ports:
  - port: 8080
    targetPort: 8080

  type: NodePort
