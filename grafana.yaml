apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
      - name: grafana
        image: grafana/grafana

        resources:
          requests:
            memory: "100Mi"
            cpu: "50m"

          limits:
            memory: "150Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service

metadata:
  name: grafana-service

spec:
  selector:
    app: grafana

  ports:
  - port: 3000
    targetPort: 3000

  type: NodePort
